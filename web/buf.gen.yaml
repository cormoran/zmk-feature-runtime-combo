version: v2
inputs:
  - directory: ../proto
plugins:
  - local: protoc-gen-ts_proto
    opt:
      - outputServices=false
      - outputJsonMethods=false
      - outputClientImpl=false
      - useExactTypes=false
      - esModuleInterop=true
      # This module's proto (SlowReleaseOverride) has an enum. ts-proto's
      # default `export enum` output fails tsconfig.app.json's
      # erasableSyntaxOnly (TS1294): enum declarations are not erasable
      # syntax. enumsAsLiterals emits an `as const` object + type alias
      # instead, which is.
      - enumsAsLiterals=true
    out: src/proto
