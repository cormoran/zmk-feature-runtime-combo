CONFIG_ZMK_KEYBOARD_NAME="Module Test"
CONFIG_LOG_PROCESS_THREAD_STARTUP_DELAY_MS=5000
# Disable console by default to disable board_cdc_acm_uart
# CONSOLE is enabled when -S zmk-usb-logging is specified
CONFIG_CONSOLE=n

# Required for custom settings
CONFIG_ZMK_STUDIO_RPC_RX_BUF_SIZE=128
CONFIG_ZMK_LOW_PRIORITY_THREAD_STACK_SIZE=2048
